<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Personalized Webpage</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Personalized Webpage</h1>

      <form>
        <div class="form-group">
          <label>Name</label>
          <input type="text" placeholder="Enter your name" />
        </div>

        <div class="form-group">
          <label>Age</label>
          <input type="number" placeholder="Enter your age" />
        </div>

        <button type="submit">Submit</button>
      </form>

      <div class="card">
        <h2>Greeting</h2>
        <p>Your personalized greeting will appear here.</p>
      </div>

      <div class="card">
        <h2>Age in Months</h2>
        <p>Your age in months will appear here.</p>
      </div>

      <div class="card">
        <h2>Age Access Check</h2>
        <p>Message about adult content access will appear here.</p>
      </div>

      <div class="card">
        <h2>Motivational Quotes</h2>
        <ul>
          <li>Your motivational quotes will appear here.</li>
        </ul>
      </div>
    </div>
  </body>
</html>
